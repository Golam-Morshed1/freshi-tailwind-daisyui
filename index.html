<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>freshi-tailwind-daisyui</title>

    <!-- Google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@100..800&display=swap" rel="stylesheet">

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

      <!-- DaisyUI v4 (compatible with Tailwind v3 CDN) -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet" />


    <!-- Font awesome -->
    <script src="https://kit.fontawesome.com/33b495cb79.js" crossorigin="anonymous"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        clifford: '#da373d',
                        freshiGreen: '#179800',
                        Secoundry: '#EFEBE3'
                    },
                    fontFamily: {
                        Sora: ["Sora", 'sans-serif'],
                    }
                }
            }
        }
    </script>


</head>

<body class="font-Sora">

    <header class="bg-gradient-to-b from-white to-Secoundry">
        <!-- Mobile Navbar -->
        <div class="navbar bg-base-100 shadow-sm md:hidden">
            <div class="navbar-start">
                <img src="image/logo-mobile.png" alt="Mobile Logo" class="h-8">
            </div>
            <div class="navbar-end">
                <div class="dropdown">
                    <div tabindex="0" role="button" class="text-freshiGreen p-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                    </div>
                    <ul tabindex="0"
                        class="menu menu-sm dropdown-content absolute right-0 mt-3 w-32 p-2 shadow bg-base-100 rounded-box z-50">
                        <li><a href="#" class="hover:text-freshiGreen">Product</a></li>
                        <li><a href="#" class="hover:text-freshiGreen">Services</a></li>
                        <li><a href="#" class="hover:text-freshiGreen">Contact</a></li>
                    </ul>
                </div>
            </div>
        </div>
        <hr class="border md:hidden border-freshiGreen w-full">


        <!-- Desktop Navbar (visible from md and up) -->
        <div class="navbar container mx-auto hidden md:flex">

            <div class="navbar-start">
                <img src="image/logo-header.png" alt="Desktop Logo" class="h-10">
            </div>

            <div class="navbar-center">
                <ul class="flex gap-6 px-1">
                    <li><a href="#" class="hover:text-freshiGreen">Product</a></li>
                    <li><a href="#" class="hover:text-freshiGreen">Services</a></li>
                    <li><a href="#" class="hover:text-freshiGreen">Contact</a></li>
                </ul>
            </div>

            <div class="navbar-end space-x-2">
                <i class="fa-solid fa-magnifying-glass"></i>
                <i class="fa-solid fa-cart-shopping"></i>
                <button
                    class="border px-3 py-1.5 rounded-lg border-freshiGreen hover:bg-freshiGreen hover:text-white">Login</button>
                <button
                    class="bg-freshiGreen text-white px-3 py-1.5 rounded-lg hover:bg-white hover:text-black hover:border hover:border-freshiGreen">Register</button>
            </div>
        </div>

        <!-- Banner section -->
        <section class="mt-8 md:mt-20 ">

            <!-- Banner-text -->
            <div class="text-center mb-10 space-y-5 md:w-2/4 mx-auto">
                <h1 class="text-2xl w-3/4 mx-auto md:w-full md:text-5xl font-bold">Freshness <span
                        class="text-freshiGreen">You Can
                        Count</span> On, Prices You’ll Love!</h1>
                <p>Shop your daily essentials at unbeatable prices. From fresh produce to pantry staples, we’ve got you
                    covered every day!</p>
            </div>

            <!-- Banner-img -->
            <div class="container mx-auto flex justify-center">
                <img src="image/hero-vegetables.png" alt="">
            </div>

        </section>


    </header>

    <main></main>

    <footer></footer>

</body>

</html>
